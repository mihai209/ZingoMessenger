name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Backend + Frontend
    runs-on: ubuntu-latest
    env:
      API_BASE: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build backend
        run: ./backend/gradlew -p backend build -x test

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*-all.jar

      - name: Build frontend (web)
        run: ./frontend/gradlew -p frontend wasmJsBrowserProductionWebpack

      - name: Package frontend artifact
        run: |
          set -e
          DIST_BUNDLE="frontend/build/kotlin-webpack/wasmJs/productionExecutable"
          INDEX_HTML="frontend/build/processedResources/wasmJs/main/index.html"
          if [ ! -d "$DIST_BUNDLE" ]; then
            echo "Expected bundle not found: $DIST_BUNDLE"
            find frontend/build -maxdepth 6 -type f
            exit 1
          fi
          if [ ! -f "$INDEX_HTML" ]; then
            echo "Expected index not found: $INDEX_HTML"
            find frontend/build -maxdepth 6 -type f
            exit 1
          fi
          mkdir -p frontend-artifact
          cp "$INDEX_HTML" frontend-artifact/index.html
          cp -r "$DIST_BUNDLE"/* frontend-artifact/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web
          path: frontend-artifact/
