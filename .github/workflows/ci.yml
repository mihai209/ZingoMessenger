name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Backend + Frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install backend deps
        run: yarn --cwd backend install

      - name: Package backend artifact
        run: |
          mkdir -p backend-artifact
          cp -r backend/src backend/package.json backend/.env.example backend-artifact/
          if [ -f backend/yarn.lock ]; then cp backend/yarn.lock backend-artifact/; fi

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-src
          path: backend-artifact/

      - name: Install frontend deps
        run: yarn --cwd frontend install

      - name: Build frontend
        run: yarn --cwd frontend build

      - name: Package frontend artifact
        run: |
          set -e
          if [ ! -d frontend/.next/standalone ]; then
            echo "Expected standalone output not found"
            ls -la frontend/.next || true
            exit 1
          fi
          mkdir -p frontend-artifact
          cp -r frontend/.next/standalone/* frontend-artifact/
          mkdir -p frontend-artifact/.next
          cp -r frontend/.next/static frontend-artifact/.next/static
          if [ -d frontend/public ]; then
            cp -r frontend/public frontend-artifact/public
          fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web
          path: frontend-artifact/
