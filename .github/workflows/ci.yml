name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Backend + Frontend
    runs-on: ubuntu-latest
    env:
      API_BASE: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build backend
        run: ./backend/gradlew -p backend build -x test

      - name: Build frontend (web)
        run: ./frontend/gradlew -p frontend wasmJsBrowserProductionWebpack

      - name: List frontend dist
        run: |
          ls -la frontend/build || true
          find frontend/build -maxdepth 6 -type f || true

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web
          path: frontend/build/
